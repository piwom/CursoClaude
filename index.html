<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Claude ABC · Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ECE2CB;
    --card: #F8F1DC;
    --card-2: #FCF6E5;
    --ink: #161208;
    --ink-2: #38301E;
    --muted: #7A6E55;
    --line: rgba(22,18,8,0.12);
    --line-strong: rgba(22,18,8,0.28);
    --module-hue: oklch(0.62 0.14 40);
    --tape: #FFE17D;
    --tape-2: #FFB877;
    --punch: #FF5C2E;
    --shadow-sm: 0 1px 2px rgba(22,18,8,0.08);
    --shadow-md: 0 6px 18px -8px rgba(22,18,8,0.24), 0 2px 4px rgba(22,18,8,0.06);
    --shadow-lg: 0 24px 50px -20px rgba(22,18,8,0.36);
  }
  [data-theme="dark"] {
    --bg: #0F0C06;
    --card: #1A150D;
    --card-2: #221C12;
    --ink: #F5ECD2;
    --ink-2: #D5C9A8;
    --muted: #847761;
    --line: rgba(245,236,210,0.1);
    --line-strong: rgba(245,236,210,0.28);
    --tape: oklch(0.78 0.15 80);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--ink); font-family: "Inter Tight", system-ui, sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; font-feature-settings: "ss01"; }
  body { min-height: 100vh; min-height: 100dvh; padding-bottom: 90px; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  ::selection { background: var(--module-hue); color: var(--card-2); }

  /* shell — phone-sized but stretches subtly on desktop */
  .stage { max-width: 480px; margin: 0 auto; padding: 0 0 24px; position: relative; }
  @media (min-width: 800px) { .stage { padding-top: 28px; } }

  /* Top brand */
  .brand-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 18px 10px;
  }
  .brand {
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 800; letter-spacing: -0.02em; font-size: 16px;
  }
  .brand-mark {
    width: 26px; height: 26px; border-radius: 8px;
    background: var(--module-hue);
    display: grid; place-items: center;
    color: var(--card-2); font-weight: 900; font-size: 14px;
    transform: rotate(-3deg);
  }
  .brand-meta { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--muted); margin-left: 6px; letter-spacing: 0.05em; }
  .icon-btn { margin-left: auto; }
  .icon-btn, .iconbtn {
    width: 38px; height: 38px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px;
    display: grid; place-items: center;
    color: var(--ink-2);
    transition: transform .1s, background-color .15s;
    box-shadow: var(--shadow-sm);
  }
  .iconbtn:active { transform: translateY(1px); }
  .icon-svg { width: 18px; height: 18px; }
  .row { display: flex; gap: 8px; align-items: center; }

  /* Module pills — chunky */
  .modpills {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 8px 18px 16px; scroll-snap-type: x mandatory;
  }
  .mp {
    flex-shrink: 0; scroll-snap-align: start;
    padding: 12px 18px 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    display: flex; flex-direction: column; gap: 4px;
    text-align: left;
    min-width: 156px;
    transition: all .2s ease;
    box-shadow: var(--shadow-sm);
  }
  .mp .mp-num { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.05em; }
  .mp .mp-title { font-size: 13.5px; font-weight: 700; line-height: 1.2; letter-spacing: -0.015em; color: var(--ink); }
  .mp .mp-prog { height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; margin-top: 6px; }
  .mp .mp-fill { height: 100%; background: var(--module-hue); transition: width .5s; }
  .mp.active {
    background: var(--module-hue);
    border-color: var(--module-hue);
    color: var(--card-2);
    transform: scale(1.02) rotate(-1deg);
    box-shadow: var(--shadow-md);
  }
  .mp.active .mp-num, .mp.active .mp-title { color: var(--card-2); }
  .mp.active .mp-prog { background: rgba(255,255,255,0.25); }
  .mp.active .mp-fill { background: var(--card-2); }

  /* Module hero — punchy big card */
  .mod-hero {
    margin: 6px 18px 16px;
    padding: 28px 22px 24px;
    background: var(--module-hue);
    color: var(--card-2);
    border-radius: 24px;
    box-shadow: var(--shadow-md);
    position: relative; overflow: hidden;
  }
  .mod-hero::before {
    content: ""; position: absolute; bottom: -50px; right: -50px;
    width: 200px; height: 200px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
  }
  .mod-hero::after {
    content: ""; position: absolute; top: -30px; right: 40px;
    width: 100px; height: 100px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .mod-hero .label { font-family: "JetBrains Mono", monospace; font-size: 11px; opacity: 0.7; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; margin-bottom: 12px; position: relative; }
  .mod-hero h2 {
    font-size: clamp(28px, 7vw, 32px);
    font-weight: 800; line-height: 1.06; letter-spacing: -0.03em;
    text-wrap: balance; position: relative;
  }
  .mod-hero .tag {
    margin-top: 12px; font-size: 15px; line-height: 1.45; opacity: 0.85;
    font-weight: 500; position: relative;
  }
  .mod-hero .stats { display: flex; gap: 16px; margin-top: 18px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.18); position: relative; }
  .mod-hero .stat { flex: 1; }
  .mod-hero .stat-n { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .mod-hero .stat-l { font-size: 11px; opacity: 0.75; font-weight: 600; }

  /* Lesson card stack */
  .stack { display: flex; flex-direction: column; gap: 14px; padding: 0 18px; }
  .lc {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 20px 20px 22px;
    box-shadow: var(--shadow-sm);
    text-align: left;
    transition: transform .15s ease, box-shadow .15s;
    position: relative;
  }
  .lc:active { transform: scale(0.99); }
  .lc.done { background: var(--card-2); }
  .lc.active {
    background: var(--card-2);
    box-shadow: var(--shadow-md);
    border-color: var(--line-strong);
  }
  .lc-head { display: flex; align-items: flex-start; gap: 12px; }
  .lc-num {
    width: 36px; height: 36px; border-radius: 12px;
    background: var(--bg); border: 1px solid var(--line);
    display: grid; place-items: center;
    font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 700;
    color: var(--ink-2);
    flex-shrink: 0;
    transition: all .2s;
  }
  .lc.active .lc-num { background: var(--ink); color: var(--bg); border-color: var(--ink); transform: rotate(-3deg); }
  .lc.done .lc-num { background: oklch(0.55 0.14 145); color: var(--card-2); border-color: oklch(0.55 0.14 145); }
  .lc-body { flex: 1; min-width: 0; }
  .lc-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; font-size: 11px; }
  .lc-meta span { font-weight: 600; color: var(--muted); }
  .lc-meta .dot { opacity: .5; }
  .lc-title { font-size: 17px; font-weight: 700; line-height: 1.2; letter-spacing: -0.015em; color: var(--ink); text-wrap: balance; }

  /* The opened lesson reader (modal-style full screen) */
  .reader-scrim { position: fixed; inset: 0; z-index: 90; background: rgba(15,12,6,0.65); opacity: 0; pointer-events: none; transition: opacity .25s; backdrop-filter: blur(4px); }
  .reader-scrim.in { opacity: 1; pointer-events: auto; }
  .reader {
    position: fixed; left: 0; right: 0; bottom: 0; top: 4%;
    z-index: 91;
    background: var(--bg);
    border-radius: 28px 28px 0 0;
    transform: translateY(100%);
    transition: transform .4s cubic-bezier(.2,.85,.25,1);
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .reader.in { transform: translateY(0); }
  @media (min-width: 800px) {
    .reader { left: 50%; right: auto; transform: translate(-50%, 100%); max-width: 480px; width: 100%; }
    .reader.in { transform: translate(-50%, 0); }
  }
  .reader-bar {
    position: sticky; top: 0; z-index: 5;
    background: color-mix(in oklab, var(--bg) 92%, transparent);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding: 12px 16px 14px;
    border-bottom: 1px solid var(--line);
  }
  .reader-bar-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .reader-grab { width: 36px; height: 4px; background: var(--line-strong); border-radius: 2px; margin: 0 auto 8px; }
  .reader-bar .crumb { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; }
  .reader-bar .crumb b { color: var(--ink); }
  .reader-progress { display: flex; gap: 3px; }
  .reader-progress .seg { flex: 1; height: 3px; background: var(--line); border-radius: 2px; overflow: hidden; }
  .reader-progress .seg .f { height: 100%; background: var(--module-hue); width: 0%; transition: width .3s; }

  /* Reader content */
  .scene { padding: 28px 22px 12px; }
  .scene-eyebrow { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--module-hue); font-weight: 700; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .scene-eyebrow::before { content: ""; width: 22px; height: 1px; background: var(--module-hue); }
  .scene-eyebrow::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .scene h1 {
    font-size: clamp(30px, 8vw, 38px);
    font-weight: 800; line-height: 1.04; letter-spacing: -0.035em;
    color: var(--ink); text-wrap: balance;
  }
  .scene .deck { font-size: 16px; color: var(--muted); margin-top: 12px; line-height: 1.45; font-weight: 500; }

  /* Body */
  .reader-body { padding: 12px 22px 24px; }
  .reader-body .para { position: relative; margin: 10px 0; transition: opacity .35s ease; }
  .reader-body .para.dim { opacity: 0.5; }
  .reader-body .para p { font-size: 17px; line-height: 1.6; color: var(--ink-2); letter-spacing: -0.005em; }
  .reader-body .para p strong { color: var(--ink); font-weight: 700; }
  .reader-body .para ul { list-style: none; padding: 4px 0; }
  .reader-body .para ul li {
    font-size: 16px; line-height: 1.5; color: var(--ink-2);
    padding: 6px 0 6px 28px; position: relative;
  }
  .reader-body .para ul li::before {
    content: ""; position: absolute; left: 4px; top: 13px;
    width: 8px; height: 8px;
    background: var(--module-hue); border-radius: 2px;
    transform: rotate(45deg);
  }
  .reader-body .para .quote {
    background: var(--card-2);
    border: 1.5px solid var(--module-hue);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 15.5px; line-height: 1.5;
    color: var(--ink);
    font-weight: 500;
    position: relative;
    margin: 8px 0;
    font-family: "JetBrains Mono", monospace;
    font-size: 13.5px;
  }
  .reader-body .para .quote::before {
    content: "$ prompt"; position: absolute; top: -10px; left: 14px;
    background: var(--module-hue); color: var(--card-2);
    font-family: "JetBrains Mono", monospace; font-size: 10px;
    padding: 3px 8px; border-radius: 6px; font-weight: 700;
    letter-spacing: 0.05em;
  }
  /* Big section heading — colored bar */
  .reader-body .scene-h {
    margin: 32px -22px 16px;
    padding: 24px 22px 18px;
    background: var(--card);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .reader-body .scene-h::before {
    content: ""; position: absolute; left: 22px; top: 14px;
    width: 30px; height: 4px; background: var(--module-hue); border-radius: 2px;
  }
  .reader-body .scene-h h3 {
    margin-top: 18px;
    font-size: clamp(22px, 5vw, 26px); font-weight: 800;
    letter-spacing: -0.025em; line-height: 1.1; color: var(--ink); text-wrap: balance;
  }
  .reader-body hr {
    border: none; margin: 28px 0; text-align: center; height: 14px;
    background-image: radial-gradient(circle, var(--line-strong) 1.5px, transparent 1.5px);
    background-size: 16px 14px; background-repeat: repeat-x; background-position: center;
  }
  /* Tape highlights */
  .reader-body .para.highlighted p,
  .reader-body .para.highlighted ul li {
    background-image: linear-gradient(180deg, transparent 0%, transparent 30%, var(--tape) 30%, var(--tape) 92%, transparent 92%);
    padding-left: 4px; padding-right: 4px;
  }
  /* Tap-to-highlight: long press handled in JS, but add tap button */
  .hl-btn-mobile {
    position: absolute; right: -6px; top: 0;
    width: 30px; height: 30px;
    background: transparent;
    color: var(--muted);
    border-radius: 50%;
    display: grid; place-items: center;
    opacity: 0;
    transition: opacity .2s, color .15s;
  }
  .para:active .hl-btn-mobile, .para.highlighted .hl-btn-mobile { opacity: 1; }
  .para.highlighted .hl-btn-mobile { color: var(--punch); }
  .hl-btn-mobile:hover { background: var(--card-2); }

  /* Try-prompt callout */
  .try-it {
    margin: 22px -22px;
    padding: 22px 22px;
    background: var(--ink);
    color: var(--card-2);
    border-radius: 0;
    position: relative;
  }
  .try-it h4 {
    font-size: 11px; letter-spacing: 0.15em; font-family: "JetBrains Mono", monospace;
    text-transform: uppercase; font-weight: 700;
    margin-bottom: 10px;
    color: var(--tape);
  }
  .try-it .pr {
    background: rgba(255,255,255,0.06);
    border: 1px dashed rgba(255,255,255,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px; line-height: 1.5;
    color: rgba(255,255,255,0.92);
  }
  .try-it .pr-actions { display: flex; gap: 8px; margin-top: 10px; }
  .try-it .pr-btn {
    padding: 8px 14px; background: var(--tape); color: var(--ink);
    border-radius: 999px; font-size: 12px; font-weight: 700;
    letter-spacing: -0.005em;
  }
  .try-it .pr-btn.ghost { background: transparent; color: var(--card-2); border: 1px solid rgba(255,255,255,0.3); }

  /* Quiz card */
  .quiz {
    margin: 28px 0 0;
    background: var(--card-2);
    border: 1.5px solid var(--ink);
    border-radius: 20px;
    padding: 22px 20px 20px;
    position: relative;
    box-shadow: 4px 4px 0 var(--ink);
    transform: rotate(-0.4deg);
  }
  .quiz .badge {
    position: absolute; top: -14px; left: 16px;
    background: var(--ink); color: var(--bg);
    font-family: "JetBrains Mono", monospace;
    padding: 4px 12px; border-radius: 999px;
    font-size: 11px; letter-spacing: 0.06em; font-weight: 700;
  }
  .quiz .q { font-size: 19px; font-weight: 800; line-height: 1.2; letter-spacing: -0.02em; margin: 10px 0 16px; text-wrap: balance; }
  .quiz .opts { display: flex; flex-direction: column; gap: 8px; }
  .quiz .opt {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px;
    background: var(--bg);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    text-align: left;
    font-size: 14px; line-height: 1.4; font-weight: 500;
    color: var(--ink-2);
    transition: all .15s;
  }
  .quiz .opt:hover { border-color: var(--ink); }
  .quiz .opt .l {
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--card); border: 1.5px solid var(--line);
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700; color: var(--ink-2);
    flex-shrink: 0; margin-top: 1px;
    font-family: "JetBrains Mono", monospace;
  }
  .quiz .opt.correct { background: oklch(0.92 0.08 145); border-color: oklch(0.55 0.13 145); color: var(--ink); }
  .quiz .opt.correct .l { background: oklch(0.55 0.13 145); color: white; border-color: oklch(0.55 0.13 145); }
  .quiz .opt.wrong { background: oklch(0.93 0.07 28); border-color: oklch(0.6 0.16 28); }
  .quiz .opt.wrong .l { background: oklch(0.6 0.16 28); color: white; border-color: oklch(0.6 0.16 28); }
  .quiz .opt.disabled { opacity: 0.45; pointer-events: none; }
  .quiz .fb { margin-top: 14px; padding: 12px 14px; background: var(--bg); border-radius: 10px; font-size: 13.5px; line-height: 1.5; color: var(--ink-2); border-left: 3px solid var(--module-hue); }
  .quiz .fb b { color: var(--ink); }

  /* Footer in reader */
  .reader-foot {
    padding: 22px 22px 30px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .complete-pill {
    padding: 16px; border-radius: 18px;
    background: var(--ink); color: var(--bg);
    display: flex; align-items: center; gap: 12px;
    font-weight: 700; font-size: 15px;
    transition: transform .1s;
  }
  .complete-pill:active { transform: scale(0.98); }
  .complete-pill.done { background: oklch(0.55 0.14 145); }
  .complete-pill .arrow { margin-left: auto; }
  .complete-pill .iconcheck { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.18); display: grid; place-items: center; flex-shrink: 0; }
  .complete-pill.done .iconcheck { background: rgba(255,255,255,0.25); }
  .reader-foot .ghost { padding: 14px; border-radius: 16px; background: var(--card); border: 1px solid var(--line); color: var(--ink-2); text-align: center; font-weight: 600; font-size: 14px; }

  /* Bottom tab nav */
  .tabnav {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 14px;
    width: calc(100% - 32px); max-width: 420px;
    z-index: 60;
    background: var(--ink); color: var(--bg);
    border-radius: 24px;
    display: flex; padding: 6px;
    box-shadow: var(--shadow-lg);
  }
  .tabnav .tab {
    flex: 1; padding: 12px 8px;
    border-radius: 18px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: rgba(255,255,255,0.55);
    font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
    transition: all .2s;
  }
  .tabnav .tab.active { background: rgba(255,255,255,0.12); color: var(--bg); }
  .tabnav .tab .ico { width: 18px; height: 18px; }
  .tabnav .tab.cta {
    background: var(--module-hue); color: white;
    flex: 1.4;
  }
  .tabnav .tab.cta.done { background: oklch(0.55 0.14 145); }

  /* Bottom sheet generic */
  .sheet-scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 110; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .sheet-scrim.in { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    z-index: 111;
    max-height: 86vh; overflow-y: auto;
    background: var(--bg);
    border-radius: 24px 24px 0 0;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.2,.85,.25,1);
    box-shadow: 0 -20px 50px -10px rgba(0,0,0,.4);
  }
  .sheet.in { transform: translateY(0); }
  @media (min-width: 800px) {
    .sheet { max-width: 480px; left: 50%; transform: translate(-50%, 100%); }
    .sheet.in { transform: translate(-50%, 0); }
  }
  .sheet-grab { width: 42px; height: 4px; background: var(--line-strong); border-radius: 2px; margin: 10px auto 0; }
  .sheet h2 { font-size: 26px; font-weight: 800; letter-spacing: -0.025em; padding: 16px 22px 6px; }
  .sheet .sub { font-size: 13px; color: var(--muted); padding: 0 22px 14px; font-weight: 500; }

  /* Stats sheet content */
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    padding: 6px 18px 14px;
  }
  .stat-tile {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px;
  }
  .stat-tile .n { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .stat-tile .l { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 600; }
  .stat-tile.big {
    grid-column: span 2;
    background: var(--ink); color: var(--bg);
    border-color: var(--ink);
  }
  .stat-tile.big .n { font-size: 56px; }
  .stat-tile.big .l { color: rgba(255,255,255,0.7); }

  .module-prog {
    margin: 4px 18px 14px;
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 14px;
  }
  .mod-prog-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
  .mod-prog-row .n { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--muted); width: 24px; }

  const blocks = text.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
  return blocks.map((block, i) => {
    if (/^\*\*[^*]+\*\*$/.test(block)) return { type: "h3", text: block.slice(2, -2), key: i };
    if (block.startsWith("*") && block.endsWith("*") && !block.startsWith("**")) return { type: "quote", text: block.slice(1, -1), key: i };
    if (block.split("\n").every(l => /^[-✓✗]\s/.test(l.trim()))) return { type: "ul", items: block.split("\n").map(l => l.replace(/^[-✓✗]\s/, "")), key: i };
    if (block === "---") return { type: "hr", key: i };
    return { type: "p", text: block, key: i };
  });
}
function inlineFormat(s) {
  const parts = []; let rest = s; let idx = 0;
  while (rest.length) {
    const m = rest.match(/\*\*(.+?)\*\*/);
    if (!m) { parts.push(<span key={idx++}>{rest}</span>); break; }
    if (m.index > 0) parts.push(<span key={idx++}>{rest.slice(0, m.index)}</span>);
    parts.push(<strong key={idx++}>{m[1]}</strong>);
    rest = rest.slice(m.index + m[0].length);
  }
  return parts;
}

const allLessonsFlat = (() => {
  const out = [];
  COURSE.modules.forEach((m, mi) => m.lessons.forEach((l, li) => out.push({ ...l, _m: mi, _l: li, _module: m })));
  return out;
})();

function App() {
  const [theme, setTheme] = useLocalState("d3-theme", "light");
  const [activeModule, setActiveModule] = useLocalState("d3-mod", 0);
  const [completed, setCompleted] = useLocalState("d3-completed", []);
  const [highlights, setHighlights] = useLocalState("d3-highlights", {});
  const [quizState, setQuizState] = useLocalState("d3-quiz", {});
  const [reader, setReader] = useState(null); // lessonId or null
  const [sheet, setSheet] = useState(null); // 'stats' | 'notes' | 'share'
  const [confetti, setConfetti] = useState(false);
  const [tapFlash, setTapFlash] = useState(null);
  const [readPct, setReadPct] = useState(0);

  useEffect(() => { document.documentElement.dataset.theme = theme; }, [theme]);

  const mod = COURSE.modules[activeModule];
  // module hue color
  useEffect(() => {
    const c = `oklch(0.62 0.14 ${mod.hue})`;
    document.documentElement.style.setProperty("--module-hue", c);
  }, [mod.hue]);

  const readerLesson = reader ? allLessonsFlat.find(l => l.id === reader) : null;
  const readerMod = readerLesson ? COURSE.modules[readerLesson._m] : null;
  const readerLi = readerLesson ? readerLesson._l : 0;
  const readerBlocks = useMemo(() => readerLesson ? renderLessonBlocks(readerLesson.content) : [], [readerLesson]);
  const readerKey = readerLesson?.id;
  const readerHL = readerLesson ? (highlights[readerKey] || []) : [];
  const readerQz = readerLesson ? quizState[readerKey] : null;
  const readerIsComp = readerLesson ? completed.includes(readerKey) : false;

  // Scroll reveal + reader progress
  useEffect(() => {
    const io = new IntersectionObserver((ents) => {
      ents.forEach(e => { if (e.isIntersecting) e.target.classList.add("in"); });
    }, { threshold: 0.12 });
    document.querySelectorAll(".reveal").forEach(el => io.observe(el));

    const isDesktop = () => window.matchMedia("(min-width: 880px)").matches;
    const onReaderScroll = (e) => {
      const t = e.target;
      const max = t.scrollHeight - t.clientHeight;
      if (max > 0) setReadPct(Math.min(1, Math.max(0, t.scrollTop / max)));
    };
    const onWindowScroll = () => {
      if (!isDesktop() || !reader) return;
      const r = document.querySelector(".reader");
      if (!r) return;
      const rect = r.getBoundingClientRect();
      const max = rect.height - window.innerHeight;
      if (max > 0) {
        const passed = -rect.top;
        setReadPct(Math.min(1, Math.max(0, passed / max)));
      }
    };
    const r = document.querySelector(".reader");
    if (r) r.addEventListener("scroll", onReaderScroll, { passive: true });
    window.addEventListener("scroll", onWindowScroll, { passive: true });
    return () => {
      io.disconnect();
      if (r) r.removeEventListener("scroll", onReaderScroll);
      window.removeEventListener("scroll", onWindowScroll);
    };
  }, [reader, readerLesson]);

  useEffect(() => {
    if (reader) {
      const r = document.querySelector(".reader");
      if (r) r.scrollTop = 0;
      window.scrollTo({ top: 0, behavior: "instant" });
      setReadPct(0);
    }
  }, [reader]);

  const fire = () => { setConfetti(true); setTimeout(() => setConfetti(false), 1900); };
  const openLesson = (id) => setReader(id);
  const closeReader = () => setReader(null);
  const markComplete = () => {
    if (!readerIsComp) { setCompleted([...completed, readerKey]); fire(); }
    const next = allLessonsFlat[allLessonsFlat.findIndex(l => l.id === readerKey) + 1];
    setTimeout(() => {
      if (next) setReader(next.id);
      else setReader(null);
    }, 600);
  };
  const tapHighlight = (i) => {
    setTapFlash(i);
    setTimeout(() => setTapFlash(null), 380);
    const list = readerHL.includes(i) ? readerHL.filter(x => x !== i) : [...readerHL, i];
    setHighlights({ ...highlights, [readerKey]: list });
  };
  const answer = (i) => {
    if (readerQz) return;
    const correct = i === readerLesson.quiz.correct;
    setQuizState({ ...quizState, [readerKey]: { selected: i, correct } });
    if (correct) fire();
  };

  const compCount = completed.length;
  const total = allLessonsFlat.length;
  const overallPct = compCount / total;
  const modProgress = (mod_) => {
    const done = mod_.lessons.filter(l => completed.includes(l.id)).length;
    return done / mod_.lessons.length;
  };
  // streak (consecutive completed from start)
  const streak = (() => {
    let s = 0;
    for (const l of allLessonsFlat) {
      if (completed.includes(l.id)) s++; else break;
    }
    return s;
  })();

  const totalMin = mod.lessons.reduce((a, l) => a + l.minutes, 0);

  return (
    <div className={"stage " + (reader ? "reading " : "") + (theme === "dark" ? "is-dark" : "")}>

      {/* Desktop-only sidebar */}
      <aside className="desk-side">
        <div className="ds-brand">
          <span className="brand-mark">C</span>
          <div className="ds-name-block">
            <div className="ds-name">ABC <span className="ds-amp">para creativos</span></div>
            <div className="ds-sub">Curso gratis · 4 módulos</div>
          </div>
        </div>
        <div className="ds-overall">
          <div className="ds-overall-row">
            <div>
              <div className="ds-overall-pct">{Math.round(overallPct * 100)}<span style={{ fontSize: 16, opacity: 0.6 }}>%</span></div>
              <div className="ds-overall-l">{compCount} de {total} · racha de {streak} 🔥</div>
            </div>
            <button className="ds-theme" onClick={() => setTheme(theme === "light" ? "dark" : "light")}>
              {theme === "light" ? I.moon : I.sun}
            </button>
          </div>
          <div className="ds-overall-bar"><div className="ds-overall-fill" style={{ width: `${overallPct * 100}%` }} /></div>
        </div>
        <div className="ds-mods-label">Módulos</div>
        <div className="ds-mods">
          {COURSE.modules.map((m, mi) => {
            const p = modProgress(m);
            const isAct = mi === activeModule;
            return (
              <button key={m.id} className={"ds-mod " + (isAct ? "active" : "")} onClick={() => { setActiveModule(mi); if (reader) closeReader(); }}>
                <span className="ds-mod-n">{m.num}</span>
                <span className="ds-mod-body">
                  <span className="ds-mod-t">{m.title.split(":")[0]}</span>
                  <span className="ds-mod-prog"><span className="ds-mod-fill" style={{ width: `${p * 100}%`, background: `oklch(0.62 0.14 ${m.hue})` }} /></span>
                  <span className="ds-mod-meta">{m.lessons.filter(l => completed.includes(l.id)).length} / {m.lessons.length} lecciones</span>
                </span>
              </button>
            );
          })}
        </div>
        <div className="ds-actions">
          <button className="ds-act" onClick={() => setSheet("stats")}><span className="ico">{I.stats}</span> Progreso</button>
          <button className="ds-act" onClick={() => setSheet("notes")}><span className="ico">{I.notes}</span> Highlights ({Object.values(highlights).flat().length})</button>
          <button className="ds-act" onClick={() => setSheet("share")}><span className="ico">{I.share}</span> Compartir</button>
        </div>
      </aside>

      {/* Main column */}
      <div className="main-col">

      <div className="brand-bar">
        <span className="brand">
          <span className="brand-mark">C</span>
          ABC<span className="brand-meta">para creativos</span>
        </span>
        <button className="iconbtn icon-btn" onClick={() => setTheme(theme === "light" ? "dark" : "light")}>
          {theme === "light" ? I.moon : I.sun}
        </button>
      </div>

      {/* Home content (mod pills + hero + stack) — hidden when reading on desktop */}
      <div className="home-content">

      {/* Module pills */}
      <div className="modpills">
        {COURSE.modules.map((m, mi) => (
          <button key={m.id} className={"mp " + (mi === activeModule ? "active" : "")} onClick={() => setActiveModule(mi)}>
            <span className="mp-num">MÓD {m.num}</span>
            <span className="mp-title">{m.title.split(":")[0].slice(0, 32)}</span>
            <span className="mp-prog"><span className="mp-fill" style={{ width: `${modProgress(m) * 100}%` }} /></span>
          </button>
        ))}
      </div>

      {/* Module hero */}
      <div className="mod-hero">
        <div className="label">Módulo {mod.num}</div>
        <h2>{mod.title}</h2>
        <p className="tag">{mod.tagline}</p>
        <div className="stats">
          <div className="stat">
            <div className="stat-n">{mod.lessons.length}</div>
            <div className="stat-l">lecciones</div>
          </div>
          <div className="stat">
            <div className="stat-n">{totalMin}</div>
            <div className="stat-l">minutos</div>
          </div>
          <div className="stat">
            <div className="stat-n">{Math.round(modProgress(mod) * 100)}%</div>
            <div className="stat-l">completado</div>
          </div>
        </div>
      </div>

      {/* Lesson stack */}
      <div className="stack">
        {mod.lessons.map((l, li) => {
          const done = completed.includes(l.id);
          // active = first incomplete
          const isActive = !done && mod.lessons.slice(0, li).every(p => completed.includes(p.id));
          return (
            <button key={l.id}
              className={"lc reveal " + (done ? "done " : "") + (isActive ? "active" : "")}
              onClick={() => openLesson(l.id)}>
              <div className="lc-head">
                <div className="lc-num">{done ? I.check : String(li + 1).padStart(2, "0")}</div>
                <div className="lc-body">
                  <div className="lc-meta">
                    <span>{l.type}</span>
                    <span className="dot">·</span>
                    <span>{l.minutes} min</span>
                    {l.usable && <><span className="dot">·</span><span style={{ color: "var(--module-hue)", fontWeight: 700 }}>practicable</span></>}
                  </div>
                  <div className="lc-title">{l.title}</div>
                </div>
                {!done && <div style={{ color: "var(--muted)" }}>{I.arrow}</div>}
              </div>
              {isActive && (
                <div style={{ marginTop: 14, padding: "10px 12px", background: "var(--bg)", borderRadius: 10, fontSize: 12, color: "var(--ink-2)", fontWeight: 500, display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ color: "var(--module-hue)", fontWeight: 700 }}>▸ Continuar</span>
                  <span style={{ opacity: 0.6 }}>tocá para abrir la lección</span>
                </div>
              )}
            </button>
          );
        })}
      </div>

      </div>{/* /home-content */}

      {/* Bottom tab nav */}
      <div className="tabnav">
        <button className="tab active">
          <span className="ico">{I.home}</span>
          Curso
        </button>
        <button className="tab" onClick={() => setSheet("stats")}>
          <span className="ico">{I.stats}</span>
          Progreso
        </button>
        <button className="tab" onClick={() => setSheet("notes")}>
          <span className="ico">{I.notes}</span>
          Notas
        </button>
        <button className={"tab cta " + (overallPct === 1 ? "done" : "")} onClick={() => {
          // continue from first incomplete
          const next = allLessonsFlat.find(l => !completed.includes(l.id));
          if (next) openLesson(next.id);
        }}>
          <span className="ico">{I.arrow}</span>
          {compCount === 0 ? "Empezar" : compCount === total ? "Final" : "Seguir"}
        </button>
      </div>

      {/* Reader */}
      <div className={"reader-scrim " + (reader ? "in" : "")} onClick={closeReader} />
      <div className={"reader " + (reader ? "in" : "")}>
        {readerLesson && (
          <>
            <div className="reader-bar">
              <div className="reader-grab"></div>
              <div className="reader-bar-top">
                <button className="iconbtn" onClick={closeReader}>{I.close}</button>
                <div style={{ flex: 1 }}>
                  <div className="crumb">Mód {readerMod.num} · Lección {readerLi + 1}/{readerMod.lessons.length}</div>
                </div>
                <button className="iconbtn" onClick={() => setSheet("share")}>{I.share}</button>
              </div>
              <div className="reader-progress">
                {readerMod.lessons.map((l, i) => (
                  <div key={l.id} className="seg">
                    <div className="f" style={{ width: i < readerLi ? "100%" : i === readerLi ? `${readPct * 100}%` : "0%" }} />
                  </div>
                ))}
              </div>
            </div>

            <div className="scene">
              <div className="scene-eyebrow">{readerLesson.type} · {readerLesson.minutes} min</div>
              <h1>{readerLesson.title}</h1>
              <p className="deck">{readerMod.tagline}</p>
            </div>

            <div className="reader-body">
              {readerBlocks.map((b, i) => {
                const isHL = readerHL.includes(i);
                const flash = tapFlash === i ? " tap-flash" : "";
                if (b.type === "h3") {
                  return (
                    <div key={i} className="scene-h reveal">
                      <h3>{b.text}</h3>
                    </div>
                  );
                }
                return (
                  <div key={i} className={"para reveal " + (isHL ? "highlighted " : "") + flash} onClick={(e) => { if (!e.target.closest('button')) tapHighlight(i); }}>
                    {b.type === "p" && <p>{inlineFormat(b.text)}</p>}
                    {b.type === "ul" && <ul>{b.items.map((it, j) => <li key={j}>{inlineFormat(it)}</li>)}</ul>}
                    {b.type === "quote" && <div className="quote">{b.text}</div>}
                    {b.type === "hr" && <hr />}
                  </div>
                );
              })}

              {/* Try-it callout if practice */}
              {readerLesson.usable && (
                <div className="try-it reveal">
                  <h4>★ probalo ahora</h4>
                  <div className="pr">
                    Soy [tu profesión] y estoy trabajando en [proyecto]. Ayudame a {readerLesson.title.toLowerCase().replace(/^[a-z]/, c => c.toLowerCase())}.
                  </div>
                  <div className="pr-actions">
                    <button className="pr-btn" onClick={() => navigator.clipboard?.writeText("Soy [tu profesión]...")}>Copiar prompt</button>
                    <button className="pr-btn ghost">Abrir Claude →</button>
                  </div>
                </div>
              )}

              {/* Quiz */}
              <div className="quiz reveal">
                <div className="badge">Quiz · 1 pregunta</div>
                <div className="q">{readerLesson.quiz.question}</div>
                <div className="opts">
                  {readerLesson.quiz.options.map((opt, i) => {
                    const isAns = readerQz && readerQz.selected === i;
                    const correct = readerLesson.quiz.correct;
                    let cls = "opt";
                    if (readerQz) {
                      if (i === correct) cls += " correct";
                      else if (isAns) cls += " wrong";
                      else cls += " disabled";
                    }
                    return (
                      <button key={i} className={cls} onClick={() => answer(i)}>
                        <span className="l">{readerQz && i === correct ? I.check : String.fromCharCode(65+i)}</span>
                        <span>{opt}</span>
                      </button>
                    );
                  })}
                </div>
                {readerQz && (
                  <div className="fb">
                    {readerQz.correct ? <><b>✓ Correcto.</b> {readerLesson.quiz.feedback}</> : <><b>Mmm.</b> La correcta era <b>{String.fromCharCode(65+readerLesson.quiz.correct)}</b>. {readerLesson.quiz.feedback}</>}
                  </div>
                )}
              </div>

              {readerIsComp && (
                <div className="celebrate-card">
                  <span className="emoji">✦</span>
                  <h3>Lección completada</h3>
                  <p>{compCount} de {total} · racha de {streak} 🔥</p>
                </div>
              )}

              <div className="reader-foot">
                <button className={"complete-pill " + (readerIsComp ? "done" : "")} onClick={markComplete}>
                  <span className="iconcheck">{I.check}</span>
                  {readerIsComp ? "Siguiente lección" : "Marcar como completada"}
                  <span className="arrow">{I.arrow}</span>
                </button>
                {activeLes !== null && COURSE.modules[activeMod]?.lessons[activeLes]?.printable && (<button className="card-btn" onClick={openPrintCard}>{I.print} Tarjeta</button>)}<button className="ghost" onClick={closeReader}>Volver al curso</button>
              </div>
            </div>
          </>
        )}
      </div>

      </div>{/* /main-col */}

      
      {printLesson && (
        <div className="print-overlay" onClick={() => setPrintLesson(null)}>
          <div className="print-modal" onClick={e => e.stopPropagation()}>
            <div className="print-modal-head">
              <div>
                <div className="print-modal-label">Tarjeta imprimible — A6</div>
                <div className="print-modal-title">{printLesson.printable.title}</div>
              </div>
              <button className="iconbtn" onClick={() => setPrintLesson(null)}>{I.close}</button>
            </div>
            <div className="print-modal-body">
              <ul>
                {printLesson.printable.points.map((p, i) => (
                  <li key={i}>{p}</li>
                ))}
              </ul>
            </div>
            <div className="print-modal-foot">
              <span className="print-modal-url">claudeparacreativxs.com</span>
              <button className="print-btn-ghost" onClick={() => setPrintLesson(null)}>Cerrar</button>
              <button className="print-btn-main" onClick={() => doPrint(printLesson)}>Imprimir ↗</button>
            </div>
          </div>
        </div>
      )}

      {/* Sheets */}
      <div className={"sheet-scrim " + (sheet ? "in" : "")} onClick={() => setSheet(null)} />
      <div className={"sheet " + (sheet === "stats" ? "in" : "")}>
        <div className="sheet-grab"></div>
        <h2>Tu progreso</h2>
        <div className="sub">{compCount} de {total} lecciones completadas</div>
        <div className="stat-grid">
          <div className="stat-tile big">
            <div className="n">{Math.round(overallPct * 100)}<span style={{ fontSize: "0.5em", opacity: 0.6 }}>%</span></div>
            <div className="l">del curso completado</div>
          </div>
          <div className="stat-tile">
            <div className="n">{streak} 🔥</div>
            <div className="l">racha sin saltar</div>
          </div>
          <div className="stat-tile">
            <div className="n">{Object.values(highlights).flat().length}</div>
            <div className="l">highlights guardados</div>
          </div>
          <div className="stat-tile">
            <div className="n">{Object.values(quizState).filter(q => q.correct).length}</div>
            <div className="l">quizzes acertados</div>
          </div>
          <div className="stat-tile">
            <div className="n">{allLessonsFlat.filter(l => completed.includes(l.id)).reduce((a, l) => a + l.minutes, 0)}</div>
            <div className="l">minutos de lectura</div>
          </div>
        </div>
        <div className="module-prog">
          {COURSE.modules.map(m => {
            const d = m.lessons.filter(l => completed.includes(l.id)).length;
            const p = d / m.lessons.length;
            return (
              <div key={m.id} className="mod-prog-row">
                <span className="n">{m.num}</span>
                <span className="t">{m.title.split(":")[0].slice(0, 30)}</span>
                <span className="b"><span className="f" style={{ width: `${p * 100}%` }} /></span>
                <span className="pct">{d}/{m.lessons.length}</span>
              </div>
            );
          })}
        </div>
        <div style={{ height: 30 }} />
      </div>

      <div className={"sheet " + (sheet === "notes" ? "in" : "")}>
        <div className="sheet-grab"></div>
        <h2>Tus highlights</h2>
        <div className="sub">tocá un párrafo en una lección para marcarlo</div>
        {Object.entries(highlights).filter(([, v]) => v && v.length).length === 0 ? (
          <div style={{ padding: "30px 22px", textAlign: "center", color: "var(--muted)", fontSize: 14 }}>
            Aún no guardaste ningún highlight.
          </div>
        ) : (
          Object.entries(highlights).flatMap(([lid, idxs]) => {
            const les = allLessonsFlat.find(l => l.id === lid);
            if (!les) return [];
            const lblocks = renderLessonBlocks(les.content);
            return idxs.map(i => {
              const b = lblocks[i];
              const text = b?.text || (b?.items ? b.items.join(" · ") : "");
              return (
                <div key={lid + i} className="note">
                  <span className="t">{text.slice(0, 220)}{text.length > 220 ? "…" : ""}</span>
                  <div className="l">{les.title}</div>
                </div>
              );
            });
          })
        )}
        <div style={{ height: 30 }} />
      </div>

      <div className={"sheet " + (sheet === "share" ? "in" : "")}>
        <div className="sheet-grab"></div>
        <h2>Compartir</h2>
        <div className="sub">una tarjeta linda lista para redes</div>
        <div className="share-host">
          <div className="share-card">
            <div className="top">Claude ABC · Mód {readerMod?.num}</div>
            <div className="ttl">"{readerLesson?.title || mod.title}"</div>
            <div className="ft">claudeparacreativos.com</div>
          </div>
          <div className="share-actions">
            <button className="secondary" onClick={() => navigator.clipboard?.writeText(window.location.href)}>Copiar link</button>
            <button className="primary">Descargar imagen</button>
          </div>
        </div>
      </div>

      {confetti && (
        <div className="confetti">
          {Array.from({ length: 50 }).map((_, i) => {
            const colors = [`oklch(0.62 0.14 ${mod.hue})`, "oklch(0.7 0.16 80)", "oklch(0.55 0.14 145)", "oklch(0.55 0.18 28)"];
            const shapes = ["50%", "1px", "1px"];
            return (
              <span key={i} style={{
                left: `${Math.random() * 100}%`,
                width: 8 + Math.random() * 6,
                height: 10 + Math.random() * 8,
                background: colors[i % colors.length],
                borderRadius: shapes[i % shapes.length],
                animationDelay: `${Math.random() * 0.4}s`,
                animationDuration: `${1.4 + Math.random() * 0.9}s`,
                transform: `rotate(${Math.random() * 360}deg)`,
              }} />
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
